# Liveness Probe 실습 YAML
#
# 이 Pod은 시작 후 30초간 /health 에 200 OK를 응답합니다.
# 30초 이후부터 /health가 500 에러를 반환합니다.
# → Kubernetes가 자동으로 Pod을 재시작하는 것을 관찰할 수 있습니다.
#
# 사용법:
#   kubectl apply -f liveness.yaml
#   kubectl get pod liveness-demo -w
#   kubectl describe pod liveness-demo  (이벤트 로그 확인)
#   kubectl delete -f liveness.yaml

apiVersion: v1
kind: Pod
metadata:
  name: liveness-demo
  labels:
    app: liveness-demo
spec:
  containers:
  - name: liveness-demo
    image: busybox:1.35
    # 30초 후 /tmp/healthy 파일을 삭제
    # → Liveness Probe가 실패하도록 고의 시뮬레이션
    command:
    - /bin/sh
    - -c
    - |
      # 서버 시작: 처음 30초는 healthy 파일 유지
      touch /tmp/healthy
      echo "Starting health server..."

      # 30초 뒤에 healthy 파일 삭제 (고의 실패)
      (sleep 30 && rm -f /tmp/healthy && echo ">>> SIMULATING FAILURE: /tmp/healthy removed") &

      # 간단한 HTTP 서버 역할: 파일 존재 여부로 상태 판단
      # (실제 앱에서는 /health 엔드포인트 구현)
      while true; do
        if [ -f /tmp/healthy ]; then
          echo "Health check OK"
        else
          echo "Health check FAIL - pod will restart"
        fi
        sleep 5
      done
    livenessProbe:
      exec:                          # 파일 존재 여부로 판단 (HTTP 서버 없이 시뮬레이션)
        command:
        - cat
        - /tmp/healthy
      initialDelaySeconds: 5         # 시작 후 5초 대기
      periodSeconds: 5               # 5초마다 체크
      failureThreshold: 3            # 3회 연속 실패 시 재시작 (=15초 후 재시작)
      successThreshold: 1            # 1회 성공 시 정상 판단
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "100m"

---
# 📌 관찰 명령어:
#
# # Pod 상태 실시간 확인 (RESTARTS 카운트 증가 확인)
# kubectl get pod liveness-demo -w
#
# # 이벤트 로그 확인 (Liveness probe failed, Killing 메시지)
# kubectl describe pod liveness-demo
#
# # 이벤트만 필터링
# kubectl get events --field-selector=involvedObject.name=liveness-demo --sort-by='.lastTimestamp'
#
# # 예상 출력:
# # Warning  Unhealthy  15s   kubelet   Liveness probe failed: ...
# # Normal   Killing    12s   kubelet   Container liveness-demo failed liveness probe, will be restarted
