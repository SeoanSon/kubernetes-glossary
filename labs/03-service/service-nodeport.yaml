apiVersion: v1
kind: Service
metadata:
  name: web-server-nodeport
  namespace: default
  labels:
    app: web-server
spec:
  type: NodePort
  ports:
  - name: http
    port: 80           # Service 내부 port
    targetPort: http   # Pod의 port
    nodePort: 30080    # Node의 port (30000-32767 범위)
    protocol: TCP
  selector:
    app: web-server
    tier: backend
